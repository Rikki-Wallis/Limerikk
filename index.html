<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store">
<title>Limerikk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  button, select, input { font-family: inherit; }

  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: #262421;
    color: #bababa;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px;
  }

  h1 {
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: .02em;
    color: #fff;
    margin-bottom: 16px;
  }
  .page-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .layout {
    display: flex;
    gap: 28px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* Board */
  #board-wrap {
    position: relative;
    box-shadow: 0 4px 24px rgba(0,0,0,.6);
    border-radius: 2px;
    overflow: hidden;
  }
  :root {
    --board-size: min(calc(100vh - 164px), calc(100vw - 352px));
  }
  #board {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(8, 1fr);
    width: var(--board-size);
    height: var(--board-size);
    user-select: none;
  }
  .sq {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    z-index: 0;
    transition: filter .1s;
  }
  .sq img.piece {
    width: 85%;
    height: 85%;
    object-fit: contain;
    pointer-events: none;
  }
  .sq.light { background: #f0d9b5; }
  .sq.dark  { background: #b58863; }
  .sq.selected { outline: 3px solid #f6f669; outline-offset: -3px; }
  .sq.legal-target::after {
    content: '';
    position: absolute;
    border-radius: 50%;
    width: 32%;
    height: 32%;
    background: rgba(0,0,0,.22);
    pointer-events: none;
    z-index: 1;
  }
  .sq.legal-capture::after {
    content: '';
    position: absolute;
    inset: 0;
    box-sizing: border-box;
    border-radius: 50%;
    border: calc(var(--board-size) / 80) solid rgba(0,0,0,.28);
    background: transparent;
    pointer-events: none;
    z-index: 1;
  }
  .sq.last-move.light { background: #d4e06a; }
  .sq.last-move.dark  { background: #b4a629; }
  .coord-file {
    position: absolute; bottom: 2px; right: 3px;
    font-size: 10px; font-weight: 700;
    color: rgba(0,0,0,.35);
    z-index: 1;
  }
  .coord-rank {
    position: absolute; top: 2px; left: 3px;
    font-size: 10px; font-weight: 700;
    color: rgba(0,0,0,.35);
    z-index: 1;
  }
  .sq.dark .coord-file, .sq.dark .coord-rank { color: rgba(255,255,255,.4); }

  /* Panel */
  .panel {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: min(260px, 90vw);
  }

  .card {
    background: #302e2b;
    border: 1px solid #3d3a36;
    border-radius: 6px;
    padding: 14px;
  }
  .card-label {
    font-size: .8rem;
    font-weight: 600;
    color: #7a7876;
    margin-bottom: 6px;
  }

  #status-text, #player-side {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
  }
  #engine-info {
    min-height: 2.4em;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .engine-stat {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .estat-label {
    font-size: .8rem;
    color: #7a7876;
    font-weight: 600;
  }
  .estat-value {
    font-size: .95rem;
    font-weight: 700;
    color: #fff;
  }
  .seldepth { font-weight: 400; color: #7a7876; }
  .score-pos  { color: #81b64c; }
  .score-neg  { color: #e06060; }
  .score-even { color: #bababa; }
  .score-mate { color: #f0c040; }

  .controls { display: flex; flex-direction: column; gap: 8px; }
  .controls button { width: 100%; }
  button {
    padding: 8px 14px;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .01em;
    transition: opacity .15s, background .15s;
  }
  button:disabled { opacity: .3; cursor: default; }

  .btn-new   { background: #81b64c; color: #fff; border-color: #81b64c; }
  .btn-new:hover:not(:disabled)   { background: #629924; border-color: #629924; }
  .btn-flip  { background: #3d3a36; color: #bababa; border-color: #4a4845; }
  .btn-flip:hover:not(:disabled)  { background: #4a4845; color: #fff; }
  .btn-sides { background: #3d3a36; color: #bababa; border-color: #4a4845; }
  .btn-sides:hover:not(:disabled) { background: #4a4845; color: #fff; }
  .btn-pgn   { background: #3d3a36; color: #9a9896; border-color: #4a4845; }
  .btn-pgn:hover:not(:disabled)   { background: #4a4845; color: #fff; }

  .time-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; font-size: .8rem; }
  .time-row select { flex: 1; }
  .time-row label { color: #7a7876; font-size: .9rem; font-weight: 600; }
  .time-row select {
    background: #3d3a36;
    color: #bababa;
    border: 1px solid #4a4845;
    border-radius: 6px;
    padding: 5px 8px;
    font-size: .9rem;
  }

  .log-box {
    background: #1e1c1a;
    border: 1px solid #3d3a36;
    border-radius: 6px;
    padding: 10px;
    height: 160px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: .75rem;
  }
  .log-box .out { color: #6a6866; }
  .log-box .in  { color: #4a4846; }

  /* Loading */
  #loading-overlay {
    position: fixed; inset: 0;
    background: #262421;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; z-index: 100;
  }
  #loading-overlay p {
    font-size: .85rem;
    color: #7a7876;
    text-transform: uppercase;
    letter-spacing: .15em;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid #3d3a36;
    border-top-color: #81b64c;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 650px), (max-aspect-ratio: 1/1) {
    :root { --board-size: 90vw; }
    .page-wrap { width: 100%; }
    .page-wrap h1 { margin-left: calc((100% - 90vw) / 2); }
    .layout { flex-direction: column; align-items: center; width: 90vw; margin: 0 auto; }
    .panel { width: 100%; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <p>Loading engine…</p>
</div>

<div class="page-wrap">
<h1>Limerikk</h1>

<div class="layout">
  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <div class="panel">
    <div class="card">
      <div class="card-label">Playing as</div>
      <span id="player-side">White</span>
    </div>

    <div class="card">
      <div class="card-label">Status</div>
      <span id="status-text">Connecting…</span>
    </div>

    <div class="card">
      <div class="card-label">Engine</div>
      <img id="monkey" src="https://preview.redd.it/the-original-image-of-the-monkey-thinking-meme-v0-ea1hkdjnx9af1.jpeg?auto=webp&s=becb6ced6bb0749959ddc0c27286cbf909699aa3"
        style="display:none;width:100%;border-radius:3px;margin-bottom:8px;" alt="thinking">
      <span id="engine-info">–</span>
    </div>

    <div class="time-row">
      <label>Think time</label>
      <select id="movetime">
        <option value="500">0.5 s</option>
        <option value="1000" selected>1 s</option>
        <option value="3000">3 s</option>
        <option value="10000">10 s</option>
      </select>
    </div>

    <div class="time-row">
      <label>Max depth</label>
      <select id="maxdepth">
        <option value="40" selected>Unlimited</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="15">15</option>
        <option value="20">20</option>
      </select>
    </div>

    <div class="log-box" id="log"></div>

    <button class="btn-new" id="btn-new" disabled style="width:100%">New Game</button>

    <div class="controls">
      <button class="btn-flip"  id="btn-flip">Flip Board</button>
      <button class="btn-sides" id="btn-sides" disabled>Play as Black</button>
      <button class="btn-pgn"   id="btn-pgn">Download PGN</button>
    </div>
  </div>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script>
// Wikipedia chess piece SVGs — stable redirect URLs, no CORS issues for img src
const PIECE_BASE = 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/piece/staunty/';
const PIECE_URLS = {
  wk: PIECE_BASE + 'wK.svg',
  wq: PIECE_BASE + 'wQ.svg',
  wr: PIECE_BASE + 'wR.svg',
  wb: PIECE_BASE + 'wB.svg',
  wn: PIECE_BASE + 'wN.svg',
  wp: PIECE_BASE + 'wP.svg',
  bk: PIECE_BASE + 'bK.svg',
  bq: PIECE_BASE + 'bQ.svg',
  br: PIECE_BASE + 'bR.svg',
  bb: PIECE_BASE + 'bB.svg',
  bn: PIECE_BASE + 'bN.svg',
  bp: PIECE_BASE + 'bP.svg',
};

function pieceImg(color, type) {
  const img = document.createElement('img');
  img.src = PIECE_URLS[color + type] || '';
  img.className = 'piece';
  img.draggable = false;
  return img;
}

// ── Board state (chess.js is source of truth) ───────────────────────────────

let game = new Chess();
let boardFlipped = false;
let selectedAlg = null;   // algebraic square e.g. "e2"
let legalTargets = new Set(); // algebraic squares
let lastMove = null;          // {from, to} algebraic

// Convert algebraic to our render index (0=a1)
function algToIdx(alg) {
  return ('abcdefgh'.indexOf(alg[0])) + (parseInt(alg[1]) - 1) * 8;
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  const b = game.board(); // 8x8 array, b[0] = rank 8

  for (let vis = 0; vis < 64; vis++) {
    const col = vis % 8;
    const row = Math.floor(vis / 8);
    const file = boardFlipped ? 7 - col : col;
    const rank = boardFlipped ? row : 7 - row;
    const alg = 'abcdefgh'[file] + (rank + 1);
    const piece = b[7 - rank][file]; // chess.js board[0]=rank8

    const div = document.createElement('div');
    div.className = 'sq ' + ((file + rank) % 2 === 0 ? 'dark' : 'light');
    div.dataset.sq = alg;

    if (selectedAlg === alg) div.classList.add('selected');
    if (legalTargets.has(alg)) div.classList.add(piece ? 'legal-capture' : 'legal-target');
    if (lastMove && (lastMove.from === alg || lastMove.to === alg)) div.classList.add('last-move');

    if (rank === 0) {
      const cf = document.createElement('span');
      cf.className = 'coord-file';
      cf.textContent = 'abcdefgh'[file];
      div.appendChild(cf);
    }
    if (file === 0) {
      const cr = document.createElement('span');
      cr.className = 'coord-rank';
      cr.textContent = rank + 1;
      div.appendChild(cr);
    }

    if (piece) {
      div.appendChild(pieceImg(piece.color, piece.type));
    }

    div.addEventListener('click', () => onSquareClick(alg));
    board.appendChild(div);
  }
}

// ── Game state ───────────────────────────────────────────────────────────────

let engineThinking = false;
let engineReady = false;
let gameOver = false;
let playerColor = 'w';

function onSquareClick(alg) {
  if (!engineReady || engineThinking || game.turn() !== playerColor || gameOver) return;

  const piece = game.get(alg);

  // Nothing selected yet
  if (!selectedAlg) {
    if (piece && piece.color === playerColor) {
      selectedAlg = alg;
      legalTargets = new Set(
        game.moves({ square: alg, verbose: true }).map(m => m.to)
      );
      renderBoard();
    }
    return;
  }

  // Deselect
  if (alg === selectedAlg) {
    selectedAlg = null; legalTargets = new Set(); renderBoard(); return;
  }

  // Reselect another white piece
  if (piece && piece.color === playerColor) {
    selectedAlg = alg;
    legalTargets = new Set(
      game.moves({ square: alg, verbose: true }).map(m => m.to)
    );
    renderBoard();
    return;
  }

  // Only allow moves to highlighted squares
  if (!legalTargets.has(alg)) {
    selectedAlg = null; legalTargets = new Set(); renderBoard(); return;
  }

  // Determine promotion (auto-queen)
  const movingPiece = game.get(selectedAlg);
  const promotion = (movingPiece.type === 'p' && alg[1] === '8') ? 'q' : undefined;

  const result = game.move({ from: selectedAlg, to: alg, promotion });
  if (!result) { selectedAlg = null; legalTargets = new Set(); renderBoard(); return; }

  lastMove = { from: selectedAlg, to: alg };
  selectedAlg = null; legalTargets = new Set();
  renderBoard();
  sendPositionToEngine();
  checkGameOver() || (game.turn() !== playerColor && triggerEngineMove());
}

function sendPositionToEngine() {
  const moves = game.history({ verbose: true })
    .map(m => m.from + m.to + (m.promotion || ''))
    .join(' ');
  engineSend(moves.length ? `position startpos moves ${moves}` : 'position startpos');
}

function triggerEngineMove() {
  engineThinking = true;
  setStatus('Engine thinking…');
  document.getElementById('monkey').style.display = 'block';
  document.getElementById('btn-new').disabled = true;
  document.getElementById('btn-sides').disabled = true;
  const mt = parseInt(document.getElementById('movetime').value);
  const depth = parseInt(document.getElementById('maxdepth').value);
  engineSend(`go movetime ${mt} depth ${depth}`);
}

function onEngineOutput(line) {
  logLine(line, 'out');

  if (line.startsWith('info depth')) {
    const depth    = line.match(/depth (\d+)/);
    const seldepth = line.match(/seldepth (\d+)/);
    const score    = line.match(/score (cp|mate) (-?\d+)/);
    if (depth && score) {
      const sign = game.turn() === 'w' ? 1 : -1;
      const cp = score[1] === 'mate' ? null : sign * parseInt(score[2]) / 100;
      const mateVal = score[1] === 'mate' ? sign * parseInt(score[2]) : null;
      const scoreStr = score[1] === 'mate'
        ? (mateVal > 0 ? '+' : '−') + `Mate in ${Math.abs(mateVal)}`
        : (cp >= 0 ? '+' : '') + cp.toFixed(2);
      const scoreClass = score[1] === 'mate' ? 'score-mate'
        : cp > 0.2 ? 'score-pos' : cp < -0.2 ? 'score-neg' : 'score-even';
      const depthStr = seldepth ? `${depth[1]}<span class="seldepth"> (Reached ${seldepth[1]})</span>` : depth[1];
      document.getElementById('engine-info').innerHTML = `
        <div class="engine-stat"><span class="estat-label">Depth</span><span class="estat-value">${depthStr}</span></div>
        <div class="engine-stat"><span class="estat-label">Score</span><span class="estat-value ${scoreClass}">${scoreStr}</span></div>`;
    }
  }

  if (line.startsWith('bestmove')) {
    engineThinking = false;
    document.getElementById('monkey').style.display = 'none';
    document.getElementById('btn-new').disabled = false;
    document.getElementById('btn-sides').disabled = false;
    const mv = line.split(' ')[1];
    if (!mv || mv === '(none)' || mv === 'null') {
      setStatus('Engine has no legal moves.');
      gameOver = true;
      return;
    }
    const from = mv.slice(0, 2), to = mv.slice(2, 4), promo = mv[4];
    const result = game.move({ from, to, promotion: promo || undefined });
    if (result) {
      lastMove = { from, to };
      renderBoard();
      sendPositionToEngine();
      checkGameOver() || setStatus(`Your turn (${playerColor === 'w' ? 'White' : 'Black'})`);
    }
  }
}

function checkGameOver() {
  if (game.in_checkmate()) {
    setStatus(game.turn() === 'w' ? 'Checkmate — Black wins!' : 'Checkmate — White wins!');
    gameOver = true; return true;
  }
  if (game.in_draw()) {
    setStatus('Draw!'); gameOver = true; return true;
  }
  if (game.in_check()) setStatus(game.turn() === 'w' ? 'White is in check!' : 'Engine is in check…');
  return false;
}

// ── Controls ─────────────────────────────────────────────────────────────────

document.getElementById('btn-new').addEventListener('click', () => {
  game = new Chess();
  lastMove = null; selectedAlg = null; legalTargets = new Set();
  engineThinking = false; gameOver = false;
  document.getElementById('engine-info').textContent = '–';
  engineSend('ucinewgame');
  renderBoard();
  if (playerColor === 'w') {
    setStatus('Your turn (White)');
  } else {
    setStatus('Engine thinking…');
    sendPositionToEngine();
    triggerEngineMove();
  }
});

document.getElementById('btn-sides').addEventListener('click', () => {
  playerColor = playerColor === 'w' ? 'b' : 'w';
  boardFlipped = playerColor === 'b';
  document.getElementById('btn-sides').textContent =
    playerColor === 'w' ? 'Play as Black' : 'Play as White';
  document.getElementById('player-side').textContent =
    playerColor === 'w' ? 'White' : 'Black';
  selectedAlg = null; legalTargets = new Set();
  renderBoard();
  if (game.turn() !== playerColor) {
    triggerEngineMove();
  } else {
    setStatus(`Your turn (${playerColor === 'w' ? 'White' : 'Black'})`);
  }
});

document.getElementById('btn-flip').addEventListener('click', () => {
  boardFlipped = !boardFlipped; renderBoard();
});

document.getElementById('btn-pgn').addEventListener('click', () => {
  const now = new Date();
  const dateStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;
  const mt = parseInt(document.getElementById('movetime').value);
  const depth = parseInt(document.getElementById('maxdepth').value);
  const depthStr = depth >= 40 ? 'unlimited' : String(depth);

  let result = '*';
  if (game.in_checkmate()) result = game.turn() === 'w' ? '0-1' : '1-0';
  else if (game.in_draw())  result = '1/2-1/2';

  game.header(
    'Event',     'Casual Game',
    'Site',      'Limerikk',
    'Date',      dateStr,
    'Round',     '?',
    'White',     playerColor === 'w' ? 'Human' : 'Limerikk',
    'Black',     playerColor === 'b' ? 'Human' : 'Limerikk',
    'Result',    result,
    'WhiteType', playerColor === 'w' ? 'human' : 'program',
    'BlackType', playerColor === 'b' ? 'human' : 'program',
    'TimeControl', `${mt / 1000}s/move depth ${depthStr}`
  );

  const pgn = game.pgn({ max_width: 80, newline_char: '\n' });
  const blob = new Blob([pgn], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'limerikk.pgn';
  a.click();
  URL.revokeObjectURL(a.href);
});

// ── Engine comms ─────────────────────────────────────────────────────────────

let worker = null;

function engineSend(cmd) {
  logLine(cmd, 'in');
  worker.postMessage({ type: 'send', cmd });
}

// ── Helpers ───────────────────────────────────────────────────────────────────

function setStatus(msg) { document.getElementById('status-text').textContent = msg; }

function logLine(text, dir) {
  const box = document.getElementById('log');
  const div = document.createElement('div');
  div.className = dir;
  div.textContent = (dir === 'in' ? '→ ' : '← ') + text;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ── Boot ──────────────────────────────────────────────────────────────────────

renderBoard();
worker = new Worker('worker.js?v=' + Date.now());

worker.onmessage = (e) => {
  if (e.data.type === 'ready') {
    document.getElementById('loading-overlay').style.display = 'none';
    engineReady = true;
    engineSend('uci');
    setStatus('Your turn (White)');
    document.getElementById('btn-new').disabled = false;
    document.getElementById('btn-sides').disabled = false;
  } else if (e.data.type === 'output') {
    onEngineOutput(e.data.line);
  } else if (e.data.type === 'error') {
    document.querySelector('#loading-overlay p').textContent = 'Error: ' + e.data.message;
  }
};

worker.onerror = (e) => { setStatus('Worker error: ' + e.message); console.error(e); };
</script>
</body>
</html>
